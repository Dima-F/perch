root = "."
tmp_dir = "bin"

[build]
  cmd = "templ generate && go build -o ./bin/server ./cmd/server"
  bin = "./bin/server"
  full_bin = "./bin/server"
  include_ext = ["go", "templ"]
  exclude_regex = ["_templ\\.go$"]
  delay = 500
  kill_delay = "500ms"
  send_interrupt = true

[log]
  time = false

[color]
  build = "yellow"
  runner = "green"
